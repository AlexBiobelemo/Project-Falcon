services:
  - type: web
    name: project-falcon
    runtime: python
    plan: starter
    # Explicitly use Daphne (ASGI server for Django Channels/WebSocket)
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: SECURE_PROXY_SSL_HEADER
        value: "HTTP_X_FORWARDED_PROTO,https"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: DATABASE_ENGINE
        value: django.db.backends.sqlite3
      - key: DATABASE_NAME
        value: db.sqlite3
      - key: ALLOWED_HOSTS
        value: "project-falcon.onrender.com,*.onrender.com,blue-falcon.onrender.com"
      - key: WEB_CONCURRENCY
        value: "0"
