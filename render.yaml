services:
  - type: web
    name: blue-falcon
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: daphne -b 0.0.0.0 -p $PORT airport_sim.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_ENGINE
        value: django.db.backends.sqlite3
      - key: DATABASE_NAME
        value: db.sqlite3
      - key: ALLOWED_HOSTS
        value: "blue-falcon.onrender.com"
