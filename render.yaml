services:
  - type: web
    name: blue-falcon
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn airport_sim.wsgi:application --workers 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_ENGINE
        value: django.db.backends.sqlite3
      - key: DATABASE_NAME
        value: db.sqlite3
      - key: ALLOWED_HOSTS
        value: "blue-falcon.onrender.com"
