services:
  - type: web
    name: blue-falcon
    runtime: python
    plan: starter
    # Daphne (ASGI server) is defined in Procfile
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: DATABASE_ENGINE
        value: django.db.backends.sqlite3
      - key: DATABASE_NAME
        value: db.sqlite3
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://blue-falcon.onrender.com"
