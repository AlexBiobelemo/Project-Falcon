<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
    <linearGradient id="cloudGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(106,228,255,0.15);stop-opacity:1" />
      <stop offset="50%" style="stop-color:rgba(182,166,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02);stop-opacity:1" />
    </linearGradient>
  </defs>
  <g filter="url(#blur)" opacity="0.6">
    <ellipse cx="80" cy="120" rx="120" ry="60" fill="url(#cloudGrad1)" />
    <ellipse cx="200" cy="100" rx="140" ry="70" fill="url(#cloudGrad1)" />
    <ellipse cx="320" cy="130" rx="100" ry="50" fill="url(#cloudGrad1)" />
    <ellipse cx="150" cy="80" rx="80" ry="45" fill="url(#cloudGrad1)" />
    <ellipse cx="280" cy="90" rx="90" ry="50" fill="url(#cloudGrad1)" />
  </g>
</svg>
