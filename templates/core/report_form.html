{% extends 'simulation/dashboard.html' %}
{% load core_filters %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-file-alt"></i> Generate Report</h1>
        <a href="{% url 'core:report_list' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back to List
        </a>
    </div>

    {% if error %}
    <div class="alert alert-danger">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Report Details</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="airport" class="form-label">Airport *</label>
                            <select name="airport" id="airport" class="form-select" required>
                                <option value="">Select Airport</option>
                                {% for airport in airports %}
                                <option value="{{ airport.id }}">{{ airport.code }} - {{ airport.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="report_type" class="form-label">Report Type *</label>
                            <select name="report_type" id="report_type" class="form-select" required>
                                {% for rt in report_type_choices %}
                                <option value="{{ rt }}">{{ rt|title|replace_underscore }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="title" class="form-label">Report Title *</label>
                            <input type="text" name="title" id="title" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="format" class="form-label">Output Format *</label>
                            <select name="format" id="format" class="form-select" required>
                                {% for fmt in format_choices %}
                                <option value="{{ fmt }}">{{ fmt|upper }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea name="description" id="description" class="form-control" rows="2"></textarea>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">Reporting Period</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="period_start" class="form-label">Start Date *</label>
                            <input type="date" name="period_start" id="period_start" class="form-control" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="period_end" class="form-label">End Date *</label>
                            <input type="date" name="period_end" id="period_end" class="form-control" required>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fas fa-file-export"></i> Generate Report
            </button>
        </div>
    </form>
</div>
{% endblock %}
