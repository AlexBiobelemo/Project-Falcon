{# Reusable filter form component #}
{% load static %}
<div class="card mb-4">
    <div class="card-body">
        <form method="get" class="row g-3">
            {% block filter_fields %}
            {# Override this block to add custom filter fields #}
            {% endblock %}
            <div class="{{ button_column_class|default:'col-md-12' }} d-flex align-items-end">
                <button type="submit" class="btn btn-secondary w-100">
                    <i class="fas fa-filter"></i> Filter
                </button>
            </div>
        </form>
    </div>
</div>
